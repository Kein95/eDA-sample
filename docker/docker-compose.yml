# Server xem thu tai cho. Chay: docker compose -f docker/docker-compose.yml up -d
# Mo http://localhost:8791/
#
# Ten project dat tay: mac dinh Compose lay ten thu muc ("docker"), trung voi stack
# chatbot cung nam trong mot thu muc ten "docker" => Compose coi container cua nhau
# la orphan. Dat ten rieng de khong bao gio xoa nham stack khac.
name: eda

services:
  eda-web:
    image: nginx:alpine
    container_name: eda-web
    ports:
      # Chi lang nghe tren may nay, khong ra ca mang LAN. Gan ca thu muc repo lam web root
      # (xem volume duoi) nghia la /supabase/migrations/*.sql, /plans/ va /.git deu tai
      # ve duoc. O nha rieng thi khong sao, o quan ca phe hay mang cong ty
      # thi bat ky ai cung xem duoc. Doi thanh "8791:80" neu can may khac trong mang xem.
      - "127.0.0.1:8791:80"
    volumes:
      # Ma nguon gan read-only: sua file la F5 thay ngay, khong can build lai
      - ..:/usr/share/nginx/html:ro
      - ./nginx-eda.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # Postgres de chay THAT cac migration truoc khi tin la chung dung.
  #
  # Cong 5480: 5433 la LVT-AR, 5470 dang co thu khac dung. Doi cong o day thi phai doi
  # ca scripts/test-db.mjs.
  #
  # Anh postgres:16 thuan, KHONG phai anh cua Supabase: muc dich la do xem schema nay
  # can bao nhieu phan Supabase. Phan Supabase that su can (bang auth.users, ham
  # auth.uid/auth.jwt) duoc dung lai boi supabase/local/00-auth-gia.sql.
  eda-db:
    image: postgres:16-alpine
    container_name: eda-db
    environment:
      POSTGRES_PASSWORD: eda-local-only
      POSTGRES_DB: eda
    ports:
      - "5480:5432"
    # Khong gan volume du lieu: day la CSDL dung thu, xoa di dung lai la chuyen binh
    # thuong. Giu du lieu lai chi lam migration chay lan hai gap trang thai cu.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eda"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped
