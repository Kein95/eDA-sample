server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Trang la mot file .dc.html duy nhat, moi tab la mot duong dan (/pathway, /docs...).
  # File co that thi tra file; con lai deu tra trang chinh de trinh duyet tu dinh tuyen.
  # Thieu dong nay thi F5 tai /pathway se 404.
  #
  # Co y KHONG co "$uri/": trong repo co thu muc ten docs/, trung voi duong dan tab
  # /docs. Neu de "$uri/" thi nginx se 301 sang /docs/ va liet ke thu muc thay vi mo
  # tab Tai lieu. Chi nhan file that, con lai deu ve trang chinh.
  # Cloudflare Pages cat duoi .html nen /admin phuc vu admin.html; nginx thi khong,
  # phai khai bao tay. Khong co hai dong nay thi /admin va /dashboard roi vao try_files
  # o duoi va ra trang tuyen sinh - xem thu tai cho se khac han ban that.
  # Bat ca duong dan con (/dashboard/web, /admin/log...) chu khong chi dung "= /dashboard":
  # khop chinh xac thi /dashboard/web roi xuong try_files o duoi va ra TRANG TUYEN SINH,
  # tra 200 nen nhin qua tuong khong sao - chi F5 vao mot tab quan tri moi thay sai.
  location ~ ^/(admin|dashboard)(/.*)?$ {
    add_header Cache-Control "no-cache";
    try_files /admin.html =404;
  }

  location / {
    # Day la server xem thu trong luc dang sua, khong phai production.
    # "no-cache" khong phai la cam cache, ma la bat trinh duyet hoi lai truoc khi
    # dung: co ETag nen lan nao khong doi thi tra 304, rat re. Thieu dong nay thi
    # iframe globe.html va anh trong ava/ giu ban cu, sua xong nhin van thay cai cu.
    add_header Cache-Control "no-cache";
    try_files $uri /TuyenSinh-eDA2026.dc.html;
  }
}
